<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeopardy!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue-dark: #0a1628;
      --blue-mid: #0e2150;
      --blue-bright: #1a3fa8;
      --blue-cell: #1432a0;
      --gold: #f5c518;
      --gold-dim: #c49a10;
      --white: #ffffff;
      --silver: #d0d8f0;
      --green: #27ae60;
      --red: #c0392b;
      --purple: #7b42c9;
      --cell-hover: #2348c0;
      --answered: #0a1628;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--blue-dark);
      font-family: 'Barlow', sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 40px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 18px;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.12em;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(245,197,24,0.5), 3px 3px 0 #8a6d00;
      line-height: 1;
    }
    header p {
      font-size: 0.85rem;
      color: var(--silver);
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* ── SCOREBOARDS ── */
    .scoreboard {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .team-card {
      background: var(--blue-mid);
      border: 2px solid var(--blue-bright);
      border-radius: 10px;
      padding: 10px 22px;
      text-align: center;
      min-width: 160px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }
    .team-card.active { border-color: var(--gold); }
    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.1em;
      color: var(--silver);
      cursor: pointer;
    }
    .team-name:hover { color: var(--gold); }
    .team-name[contenteditable="true"] { outline: 1px dashed var(--gold); padding: 0 4px; border-radius: 3px; }
    .team-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--gold);
      line-height: 1.1;
    }
    .score-btns { display: flex; gap: 6px; margin-top: 6px; justify-content: center; }
    .score-btn {
      border: none; cursor: pointer; border-radius: 5px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      padding: 3px 10px; letter-spacing: 0.05em; transition: opacity 0.15s;
    }
    .score-btn:hover { opacity: 0.85; }
    .score-btn.plus  { background: var(--green); color: #fff; }
    .score-btn.minus { background: var(--red);   color: #fff; }
    .score-btn.reset-team { background: #444; color: #ccc; font-size: 0.7rem; padding: 3px 8px; }

    /* ── GAME BOARD ── */
    .board-wrapper {
      width: 100%;
      max-width: 1100px;
      overflow-x: auto;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      width: 100%;
      min-width: 600px;
    }

    /* Category headers */
    .category-header {
      background: var(--blue-bright);
      border: 2px solid #2a50c8;
      border-radius: 8px;
      text-align: center;
      padding: 10px 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      letter-spacing: 0.08em;
      color: var(--white);
      cursor: pointer;
      transition: background 0.2s;
      word-break: break-word;
    }
    .category-header:hover { background: var(--cell-hover); }
    .category-header[contenteditable="true"] {
      outline: 2px dashed var(--gold);
      color: var(--gold);
    }

    /* Point cells */
    .cell {
      background: var(--blue-cell);
      border: 2px solid #2a50c8;
      border-radius: 8px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--gold);
      cursor: pointer;
      min-height: 72px;
      box-shadow: var(--shadow);
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      user-select: none;
      position: relative;
    }
    .cell:hover:not(.answered) { background: var(--cell-hover); transform: scale(1.03); }
    .cell.answered {
      background: var(--answered);
      color: transparent;
      border-color: #1a2a60;
      cursor: default;
      pointer-events: none;
    }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,10,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--blue-mid);
      border: 3px solid var(--gold);
      border-radius: 16px;
      width: 100%;
      max-width: 640px;
      padding: 32px 28px 24px;
      box-shadow: 0 0 60px rgba(245,197,24,0.2);
      position: relative;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .modal-close {
      position: absolute; top: 14px; right: 18px;
      background: none; border: none; color: var(--silver);
      font-size: 1.6rem; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--gold); }
    .modal-points {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.1em;
      color: var(--gold); margin-bottom: 6px;
    }
    .modal-category {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.08em;
      color: var(--silver); margin-bottom: 18px;
    }
    .modal-question {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.45;
      margin-bottom: 20px;
      min-height: 60px;
    }
    .reveal-btn {
      background: var(--gold);
      color: var(--blue-dark);
      border: none; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.08em;
      padding: 10px 26px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .reveal-btn:hover { background: #e0b400; transform: scale(1.04); }
    .modal-answer {
      display: none;
      background: rgba(245,197,24,0.12);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gold);
      margin-top: 16px;
      line-height: 1.5;
    }
    .modal-answer.visible { display: block; }

    .modal-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 20px; align-items: center;
    }
    .modal-actions label {
      font-size: 0.8rem; color: var(--silver); letter-spacing: 0.05em;
      margin-right: 2px;
    }
    .award-btn {
      border: none; cursor: pointer; border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      letter-spacing: 0.05em; padding: 7px 16px; transition: opacity 0.15s;
    }
    .award-btn:hover { opacity: 0.85; }
    .award-btn.correct  { background: var(--green); color: #fff; }
    .award-btn.wrong    { background: var(--red);   color: #fff; }
    .mark-answered-btn {
      margin-left: auto;
      border: 1px solid var(--silver); background: transparent;
      color: var(--silver); border-radius: 6px;
      font-family: 'Barlow', sans-serif; font-size: 0.82rem;
      padding: 6px 12px; cursor: pointer;
    }
    .mark-answered-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── EDIT MODAL ── */
    .edit-modal {
      background: var(--blue-dark);
      border: 2px solid var(--blue-bright);
      border-radius: 14px;
      width: 100%; max-width: 520px;
      padding: 28px 24px 22px;
      position: relative;
    }
    .edit-modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.1em;
      color: var(--gold); margin-bottom: 18px;
    }
    .edit-modal label {
      display: block; font-size: 0.82rem;
      letter-spacing: 0.06em; color: var(--silver);
      margin-bottom: 4px; margin-top: 14px;
    }
    .edit-modal textarea, .edit-modal input {
      width: 100%; background: var(--blue-mid);
      border: 1px solid var(--blue-bright); border-radius: 6px;
      color: var(--white); font-family: 'Barlow', sans-serif;
      font-size: 0.95rem; padding: 8px 12px; resize: vertical;
    }
    .edit-modal textarea { min-height: 80px; }
    .edit-modal input:focus, .edit-modal textarea:focus {
      outline: none; border-color: var(--gold);
    }
    .save-btn {
      margin-top: 18px; background: var(--gold);
      color: var(--blue-dark); border: none; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem;
      letter-spacing: 0.08em; padding: 10px 28px; cursor: pointer;
    }
    .save-btn:hover { background: #e0b400; }

    /* ── RESET BAR ── */
    .controls {
      margin-top: 22px;
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .ctrl-btn {
      background: var(--blue-mid); border: 1px solid var(--blue-bright);
      color: var(--silver); border-radius: 7px;
      font-family: 'Barlow', sans-serif; font-size: 0.88rem;
      padding: 7px 18px; cursor: pointer; transition: 0.15s;
    }
    .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--blue-mid); border: 1px solid var(--gold);
      border-radius: 8px; padding: 10px 24px;
      font-size: 0.9rem; color: var(--gold);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 520px) {
      .modal { padding: 24px 16px 18px; }
      .modal-question { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Jeopardy!</h1>
  <p>Click a category header to rename it &mdash; click a cell to play &mdash; double-click a cell to edit its question</p>
</header>

<!-- SCOREBOARDS -->
<div class="scoreboard" id="scoreboard"></div>

<!-- BOARD -->
<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn" onclick="resetBoard()">↺ Reset Board (unmark all)</button>
  <button class="ctrl-btn" onclick="resetScores()">↺ Reset All Scores</button>
</div>

<!-- PLAY OVERLAY -->
<div class="overlay" id="playOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closePlay()">✕</button>
    <div class="modal-points" id="modalPoints"></div>
    <div class="modal-category" id="modalCategory"></div>
    <div class="modal-question" id="modalQuestion"></div>
    <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
    <div class="modal-answer" id="modalAnswer"></div>
    <div class="modal-actions" id="modalActions" style="display:none">
      <span class="label" style="color:var(--silver);font-size:0.82rem;letter-spacing:0.05em">Award to:</span>
      <div id="awardBtns"></div>
      <button class="mark-answered-btn" onclick="markAnswered()">Mark Answered ✓</button>
    </div>
  </div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="editOverlay">
  <div class="edit-modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h2>Edit Question</h2>
    <label>QUESTION (what players see)</label>
    <textarea id="editQ" rows="3"></textarea>
    <label>ANSWER (shown after reveal)</label>
    <textarea id="editA" rows="2"></textarea>
    <button class="save-btn" onclick="saveEdit()">Save</button>
  </div>
</div>

<!-- EDIT-ALL OVERLAY -->
<div class="overlay" id="editAllOverlay">
  <div class="edit-modal" style="max-width:700px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="closeEditAll()">✕</button>
    <h2>Edit All Questions &amp; Answers</h2>
    <p style="color:var(--silver);font-size:0.83rem;margin-bottom:10px">Fill in each row. Leave blank to keep placeholder text.</p>
    <div id="editAllFields"></div>
    <button class="save-btn" onclick="saveEditAll()">Save All</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║              ★  EDIT YOUR GAME CONTENT HERE  ★                  ║
// ║                                                                  ║
// ║  1. Change the CATEGORY NAMES in the `categories` array.        ║
// ║  2. Fill in QUESTIONS and ANSWERS below.                        ║
// ║     Each column matches the category at the same position.      ║
// ║     Each row matches a point value: $200 · $400 · $600 ·        ║
// ║     $800 · $1000 · $2000 (top to bottom).                       ║
// ║  3. Save the file — that's it! No buttons needed.               ║
// ╚══════════════════════════════════════════════════════════════════╝

const POINT_VALUES = [100, 200, 300, 400, 500, 600];

// ── CATEGORY NAMES (6 total) ──────────────────────────────────────
let categories = [
  "Using Objects and Methods",   // Column 1
  "Selection and Iteration",   // Column 2
  "Class Creation",   // Column 3
  "Data Collections 1",   // Column 4
  "Data Collections 2",   // Column 5
  "Data Collections 3"    // Column 6
];

// ── TEAM NAMES ───────────────────────────────────────────────────
// Change these to your team names (you can also rename them in-game)
const DEFAULT_TEAM_NAMES = ["Team 1", "Team 2", "Team 3"];

// ── QUESTIONS & ANSWERS ──────────────────────────────────────────
// Format:  { q: "Your question here", a: "Your answer here" }
// Rows go $200 → $400 → $600 → $800 → $1000 → $2000

let questions = [

  // ── COLUMN 1: Category 1 ────────────────────────────────────────
  [
    { q: `public class Calculator 
{
    public static void main(String[] args) 
    {
        int x = 10 / 0; // Line 3
        System.out.println(x);
    }
}
The code compiles but there is an error when it is executed. What type of error occurs when executing Line 3?
`,  a: "Runtime Error"  },  // $200
    { q: `int age = 0;
double height = 0.0;
boolean isTall = false;
Scanner in = null;

True/ False: The code segment correctly assigns default values to all its variables. 
`,  a: "True"  },  // $400
    { q: `public static void main(String args[]){
    
    int x=4;
    int y=5;
    int z=6;    
    x+=y;
    z-=y;
    y*=x;
    int a=y;
    a/=5;
    int b=y;
    b%=a;
    
    System.out.println(" x is : "+ x);    
    System.out.println(" y is : "+ y);
    System.out.println(" z is : "+ z);
    System.out.println(" a is : "+ a);
    System.out.println(" b is : "+ b);
}
What will be the output of the above code?
`,  a: `x is : 9
y is : 45
z is : 1
a is : 9
b is : 0`  },  // $600
    { q: `double num = 75.0;
String str = "" + (num + 0.2);
System.out.println(str);
True/False: The code segment above will produce an error.
`,  a: "False, the code segment will print 75.2."  },  // $800
    { q: `    public class Z  
    {  
        public static int A(int x)  
        {  
            x *= -x;  
            return(x);  
        }  
          
        public static int B(int x)  
        {  
            x += x;  
            return(x);  
        }  
        
        public static int C(int x)  
        {  
            x/=2;  
            return(x);  
        }  
    } 
What is returned as a result of calling Z.C(Z.A(Z.B(Z.C(5)))) executed from another class ?
`, a: "-8" },  // $1000
    { q: `public class Chalkboard {

              public void write (String date, String time){
                     
                    System.out.println("Today's  Date: "  + date + "    Day: " + time);
                     }
              public void write (String subject){
                 
                    System.out.println("Subject:  "  +  subject);
                     }
              public void write (int lines , String content){
                
                    int x=1;
                    while (x<=lines) {
                    System.out.println (x + " :  " +content);
                    x++;
                   
                     }
                   }
    public static void main (String args[]){
                Chalkboard board = new Chalkboard();
                 board.write (" 4/6/2021", "Tuesday" );
                 board.write("Computer Science");
                 System.out.println();
                  board.write (3, "This is an example of a while loop that loops three times.");

          }
}


What is the output after running the program code ?
`, a: `Today's  Date:  4/6/2021    Day: Tuesday
Subject:  Computer Science

1 :  This is an example of a while loop that loops three times.
2 :  This is an example of a while loop that loops three times.
3 :  This is an example of a while loop that loops three times.
` },  // $2000
  ],

  // ── COLUMN 2: Category 2 ────────────────────────────────────────
  [
    { q: "Question 2 for $200",  a: "Answer 2 for $200"  },
    { q: "Question 2 for $400",  a: "Answer 2 for $400"  },
    { q: "Question 2 for $600",  a: "Answer 2 for $600"  },
    { q: "Question 2 for $800",  a: "Answer 2 for $800"  },
    { q: "Question 2 for $1000", a: "Answer 2 for $1000" },
    { q: "Question 2 for $2000", a: "Answer 2 for $2000" },
  ],

  // ── COLUMN 3: Category 3 ────────────────────────────────────────
  [
    { q: "Question 3 for $200",  a: "Answer 3 for $200"  },
    { q: "Question 3 for $400",  a: "Answer 3 for $400"  },
    { q: "Question 3 for $600",  a: "Answer 3 for $600"  },
    { q: "Question 3 for $800",  a: "Answer 3 for $800"  },
    { q: "Question 3 for $1000", a: "Answer 3 for $1000" },
    { q: "Question 3 for $2000", a: "Answer 3 for $2000" },
  ],

  // ── COLUMN 4: Category 4 ────────────────────────────────────────
  [
    { q: "Question 4 for $200",  a: "Answer 4 for $200"  },
    { q: "Question 4 for $400",  a: "Answer 4 for $400"  },
    { q: "Question 4 for $600",  a: "Answer 4 for $600"  },
    { q: "Question 4 for $800",  a: "Answer 4 for $800"  },
    { q: "Question 4 for $1000", a: "Answer 4 for $1000" },
    { q: "Question 4 for $2000", a: "Answer 4 for $2000" },
  ],

  // ── COLUMN 5: Category 5 ────────────────────────────────────────
  [
    { q: "Question 5 for $200",  a: "Answer 5 for $200"  },
    { q: "Question 5 for $400",  a: "Answer 5 for $400"  },
    { q: "Question 5 for $600",  a: "Answer 5 for $600"  },
    { q: "Question 5 for $800",  a: "Answer 5 for $800"  },
    { q: "Question 5 for $1000", a: "Answer 5 for $1000" },
    { q: "Question 5 for $2000", a: "Answer 5 for $2000" },
  ],

  // ── COLUMN 6: Category 6 ────────────────────────────────────────
  [
    { q: "Question 6 for $200",  a: "Answer 6 for $200"  },
    { q: "Question 6 for $400",  a: "Answer 6 for $400"  },
    { q: "Question 6 for $600",  a: "Answer 6 for $600"  },
    { q: "Question 6 for $800",  a: "Answer 6 for $800"  },
    { q: "Question 6 for $1000", a: "Answer 6 for $1000" },
    { q: "Question 6 for $2000", a: "Answer 6 for $2000" },
  ],

];
// ── END OF EDITABLE CONTENT ──────────────────────────────────────

// answered[col][row] = bool
let answered = Array.from({length:6}, () => Array(6).fill(false));

const TEAM_COLORS = ['#1a3fa8','#7b42c9','#1d7a3a'];
let teams = DEFAULT_TEAM_NAMES.map(name => ({ name, score: 0 }));

// ─────────────────────────────────────────────
//  STATE for current modal
// ─────────────────────────────────────────────
let activeCell = null; // { col, row }
let editCell = null;

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="team-name" title="Click to rename" onclick="renameTeam(${i}, this)" contenteditable="false">${t.name}</div>
      <div class="team-score" id="score-${i}">$${t.score.toLocaleString()}</div>
      <div class="score-btns">
        <button class="score-btn plus"  onclick="adjustScore(${i}, 200)">+200</button>
        <button class="score-btn minus" onclick="adjustScore(${i},-200)">−200</button>
        <button class="score-btn reset-team" onclick="adjustScore(${i}, -teams[${i}].score)">Reset</button>
      </div>`;
    sb.appendChild(card);
  });
}

function renameTeam(i, el) {
  el.contentEditable = "true";
  el.focus();
  el.onblur = () => {
    el.contentEditable = "false";
    teams[i].name = el.textContent.trim() || `Team ${i+1}`;
    el.textContent = teams[i].name;
    renderAwardBtns();
  };
  el.onkeydown = e => { if(e.key==='Enter') { e.preventDefault(); el.blur(); } };
}

function adjustScore(i, delta) {
  teams[i].score = Math.max(0, teams[i].score + delta);
  document.getElementById(`score-${i}`).textContent = `$${teams[i].score.toLocaleString()}`;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // Row 0: category headers
  categories.forEach((cat, c) => {
    const h = document.createElement('div');
    h.className = 'category-header';
    h.textContent = cat;
    h.title = 'Click to edit category name';
    h.onclick = () => editCategory(c, h);
    board.appendChild(h);
  });
  // Rows 1–6: cells
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 6; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (answered[c][r] ? ' answered' : '');
      cell.id = `cell-${c}-${r}`;
      cell.textContent = answered[c][r] ? '' : `$${POINT_VALUES[r].toLocaleString()}`;
      cell.dataset.col = c;
      cell.dataset.row = r;
      cell.onclick = () => openPlay(c, r);
      cell.ondblclick = e => { e.stopPropagation(); openEditCell(c, r); };
      board.appendChild(cell);
    }
  }
}

function editCategory(c, el) {
  el.contentEditable = "true";
  el.focus();
  document.execCommand('selectAll', false, null);
  el.onblur = () => {
    el.contentEditable = "false";
    categories[c] = el.textContent.trim() || `Category ${c+1}`;
    el.textContent = categories[c];
  };
  el.onkeydown = e => { if(e.key==='Enter') { e.preventDefault(); el.blur(); } };
}

// ─────────────────────────────────────────────
//  PLAY MODAL
// ─────────────────────────────────────────────
function openPlay(c, r) {
  if (answered[c][r]) return;
  activeCell = {c, r};
  document.getElementById('modalPoints').textContent = `$${POINT_VALUES[r].toLocaleString()}`;
  document.getElementById('modalCategory').textContent = categories[c];
  document.getElementById('modalQuestion').textContent = questions[c][r].q;
  const ansEl = document.getElementById('modalAnswer');
  ansEl.textContent = questions[c][r].a;
  ansEl.classList.remove('visible');
  document.getElementById('revealBtn').style.display = 'inline-block';
  document.getElementById('modalActions').style.display = 'none';
  document.getElementById('playOverlay').classList.add('open');
}
function closePlay() {
  document.getElementById('playOverlay').classList.remove('open');
  activeCell = null;
}
function revealAnswer() {
  document.getElementById('modalAnswer').classList.add('visible');
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('modalActions').style.display = 'flex';
  renderAwardBtns();
}
function renderAwardBtns() {
  const wrap = document.getElementById('awardBtns');
  if (!wrap) return;
  wrap.innerHTML = '';
  wrap.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;';
  teams.forEach((t, i) => {
    const pts = activeCell ? POINT_VALUES[activeCell.r] : 0;
    const btn = document.createElement('button');
    btn.className = 'award-btn correct';
    btn.style.background = TEAM_COLORS[i];
    btn.textContent = `+$${pts.toLocaleString()} → ${t.name}`;
    btn.onclick = () => { adjustScore(i, pts); markAnswered(); toast(`+$${pts.toLocaleString()} awarded to ${t.name}!`); };
    wrap.appendChild(btn);
  });
}
function markAnswered() {
  if (!activeCell) return;
  const {c, r} = activeCell;
  answered[c][r] = true;
  const cell = document.getElementById(`cell-${c}-${r}`);
  if (cell) { cell.classList.add('answered'); cell.textContent = ''; }
  closePlay();
}

// ─────────────────────────────────────────────
//  EDIT SINGLE CELL
// ─────────────────────────────────────────────
function openEditCell(c, r) {
  editCell = {c, r};
  document.getElementById('editQ').value = questions[c][r].q;
  document.getElementById('editA').value = questions[c][r].a;
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  editCell = null;
}
function saveEdit() {
  if (!editCell) return;
  const {c, r} = editCell;
  questions[c][r].q = document.getElementById('editQ').value.trim() || questions[c][r].q;
  questions[c][r].a = document.getElementById('editA').value.trim() || questions[c][r].a;
  closeEdit();
  toast('Question saved!');
}

// ─────────────────────────────────────────────
//  EDIT ALL
// ─────────────────────────────────────────────
function openEditAll() {
  const wrap = document.getElementById('editAllFields');
  wrap.innerHTML = '';
  for (let c = 0; c < 6; c++) {
    for (let r = 0; r < 6; r++) {
      const sec = document.createElement('div');
      sec.style.cssText = 'border-top:1px solid #1a3fa8;padding-top:10px;margin-top:10px;';
      sec.innerHTML = `
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:0.08em">
          ${categories[c]} — $${POINT_VALUES[r].toLocaleString()}
        </div>
        <label>Question</label>
        <textarea id="ea-q-${c}-${r}" rows="2">${questions[c][r].q}</textarea>
        <label>Answer</label>
        <input type="text" id="ea-a-${c}-${r}" value="${questions[c][r].a}"/>
      `;
      wrap.appendChild(sec);
    }
  }
  document.getElementById('editAllOverlay').classList.add('open');
}
function closeEditAll() { document.getElementById('editAllOverlay').classList.remove('open'); }
function saveEditAll() {
  for (let c = 0; c < 6; c++) {
    for (let r = 0; r < 6; r++) {
      const q = document.getElementById(`ea-q-${c}-${r}`).value.trim();
      const a = document.getElementById(`ea-a-${c}-${r}`).value.trim();
      if (q) questions[c][r].q = q;
      if (a) questions[c][r].a = a;
    }
  }
  closeEditAll();
  toast('All questions saved!');
}

// ─────────────────────────────────────────────
//  RESET
// ─────────────────────────────────────────────
function resetBoard() {
  answered = Array.from({length:6}, () => Array(6).fill(false));
  renderBoard();
  toast('Board reset!');
}
function resetScores() {
  teams.forEach((t,i) => { t.score = 0; document.getElementById(`score-${i}`).textContent = '$0'; });
  toast('Scores reset!');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────
//  CLOSE overlays on backdrop click
// ─────────────────────────────────────────────
['playOverlay','editOverlay','editAllOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) {
      if (id==='playOverlay') closePlay();
      else if (id==='editOverlay') closeEdit();
      else closeEditAll();
    }
  });
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderScoreboard();
renderBoard();
</script>
</body>
</html>
